<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto</title>

    <!-- Fuente Figtree -->
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/proyectos/estilo-proy.css">
</head>
<body>

<header class="navegacion">

    <div class="logo"><img src="/images/logo/br-rojo.svg" alt="Logo - Brian Rivera"></div>

    <a class="idioma" id="btnIdioma">ES</a>

</header>

<main class="contenedor-proyecto">

    <a href="../../portfolio-Alexia.html" class="btn-regresar">
        ←
    </a>

    <header class="proyecto-header">
        <h1 class="proyecto-titulo">Título del Proyecto</h1>
        <span class="proyecto-rol">Front-End Developer</span>
    </header>

    <section class="banner-principal">
        <img src="https://via.placeholder.com/1200x600" class="principal" alt="Imagen del proyecto">
    </section>

    <section class="info-seccion">
        <div class="etiqueta">Tecnologías utilizadas</div>
        <div class="tags-contenedor">
            <span class="tag">HTML5</span>
            <span class="tag">CSS3</span>
            <span class="tag">JavaScript</span>
        </div>
    </section>

    <section class="info-seccion">
        <div class="etiqueta">Competencias técnicas</div>
        <div class="tags-contenedor">
            <span class="tag">UI/UX Design</span>
            <span class="tag">Responsive Design</span>
            <span class="tag">Git/GitHub</span>
        </div>
    </section>

    <section class="galeria-pruebas">
        <img src="https://via.placeholder.com/400" class="secundaria" alt="Imagen 1 del proyecto">
        <img src="https://via.placeholder.com/400" class="secundaria" alt="Imagen 2 del proyecto">
        <img src="https://via.placeholder.com/400" class="secundaria" alt="Imagen 3 del proyecto">
    </section>

    <footer class="proyecto-footer">
        <a href="#" class="btn-github">Github</a>

        <button class="btn-demo">
            Ver proyecto →
        </button>
    </footer>

</main>

<script src="/idioma.js"></script>

</body>
</html>
